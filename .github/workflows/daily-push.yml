name: Daily WeChat Push

# 定时触发（UTC时间，北京时间需要+8小时）
# 例如：每天早上8点推送 → UTC时间0点 → cron: 0 0 * * *
# 每天晚上21点推送 → UTC时间13点 → cron: 0 13 * * *
on:
  schedule:
    - cron: '54 17 * * *'  
  workflow_dispatch:  # 手动触发开关

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行推送脚本
        env:
          # 从GitHub Secrets中读取环境变量
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          OPEN_ID: ${{ secrets.OPEN_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          CITY: ${{ secrets.CITY }}
          TINGTING_LUNAR_BIRTHDAY: ${{ secrets.TINGTING_LUNAR_BIRTHDAY }}
          LOVE_START_DATE: ${{ secrets.LOVE_START_DATE }}
          MEET_START_DATE: ${{ secrets.MEET_START_DATE }}
        run: python main.py
